---
- name: "Select vars file for distribution"
  include_vars: "{{ lookup('ansible.builtin.first_found', params) }}"
  vars:
    params:
      files:
        - "{{ ansible_distribution | lower }}-{{ ansible_distribution_version }}.yml"
        - "{{ ansible_distribution | lower }}-{{ ansible_distribution_major_version }}.yml"
        - "{{ ansible_distribution | lower }}.yml"
        - "defaults.yml"

      paths:
        - "{{ role_path }}/vars"

- name: "Make sure the dependencies are installed"
  apt:
    pkg: "{{ntp_deps}}"
    state: present

- name: "Stop ntp if not running"
  service:
    name: "{{ ntp_service_name }}"
    state: "stopped"
  when: not ntp_running

- name: "Check for apparmor"
  command: "dpkg -s apparmor"
  ignore_errors: true
  register: apparmor_check
  changed_when: false

- name: "Ignore NTP DHCP Configuration"
  file:
    path: "/var/lib/ntp/ntp.conf.dhcp"
    state: "absent"
  when: not ntp_dhcp
  notify: restart ntp

- name: "Check for ntp apparmor configuration"
  stat:
    path: "/etc/apparmor.d/usr.sbin.ntpd"
  register: apparmor_conf

- name: "Update apparmor for leapseconds"
  lineinfile:
    dest: "/etc/apparmor.d/usr.sbin.ntpd"
    line: "  /etc/ntp.leapseconds r,"
    regexp: ".+ntp.leapseconds.+"
    insertafter: ".+ntp.conf.+"
  when: apparmor_check.rc == 0 and apparmor_conf.stat.exists
  notify:
    - reload ntp apparmor
    - restart ntp
  retries: 5
  delay: 5

- name: "Fetch leapseconds file"
  get_url:
    url: "{{ntp_leapurl}}"
    dest: "/etc/ntp.leapseconds"
    owner: "{{ntp_user}}"
    group: "{{ntp_group}}"
    mode: "0660"
  notify:
    - restart ntp

- name: "Configure ntp (/etc/ntp.conf)"
  template:
    src: etc_ntp.conf.j2
    dest: /etc/ntp.conf
    owner: "{{ntp_user}}"
    group: "{{ntp_group}}"
    mode: "0660"
  notify:
    - restart ntp

- name: "Copy auto-ntpdate script"
  copy:
    src: auto-ntpdate.sh
    dest: /usr/local/sbin/auto-ntpdate
    mode: 0770
  when: ntp_auto_update and not ntp_use_systemd_timer

- name: "Generate auto-ntpdate cron"
  cron:
    name: "ANXS auto-ntpdate"
    hour: "*/{{ntp_auto_update_hour}}"
    minute: "0"
    state: present
    job: "/usr/local/sbin/auto-ntpdate"
  when: ntp_auto_update and not ntp_use_systemd_timer

- name: "Remove auto-ntpdate cron"
  cron:
    name: "ANXS auto-ntpdate"
    state: absent
  when: not ntp_auto_update and not ntp_use_systemd_timer

- name: "Remove auto-ntpdate script (cron)"
  file:
    path: /usr/local/sbin/auto-ntpdate
    state: absent
  when: not ntp_auto_update and not ntp_use_systemd_timer

- name: "Clean up legacy auto-ntpdate cron entry"
  cron:
    name: "ANXS auto-ntpdate"
    state: absent
  when: ntp_use_systemd_timer
  ignore_errors: true

- name: "Clean up legacy auto-ntpdate script"
  file:
    path: /usr/local/sbin/auto-ntpdate
    state: absent
  when: ntp_use_systemd_timer

- name: "Deploy auto-ntpdate systemd service"
  template:
    src: auto-ntpdate.service.j2
    dest: /etc/systemd/system/auto-ntpdate.service
    owner: root
    group: root
    mode: "0644"
  when: ntp_auto_update and ntp_use_systemd_timer
  notify: reload systemd

- name: "Deploy auto-ntpdate systemd timer"
  template:
    src: auto-ntpdate.timer.j2
    dest: /etc/systemd/system/auto-ntpdate.timer
    owner: root
    group: root
    mode: "0644"
  when: ntp_auto_update and ntp_use_systemd_timer
  notify:
    - reload systemd
    - enable auto-ntpdate timer

- name: "Stop and disable auto-ntpdate timer"
  systemd:
    name: auto-ntpdate.timer
    state: stopped
    enabled: false
  when: not ntp_auto_update and ntp_use_systemd_timer
  ignore_errors: true

- name: "Remove auto-ntpdate systemd units"
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/systemd/system/auto-ntpdate.service
    - /etc/systemd/system/auto-ntpdate.timer
  when: not ntp_auto_update and ntp_use_systemd_timer
  notify: reload systemd

- name: "Stop ntp if not running"
  service:
    name: "{{ ntp_service_name }}"
    state: "stopped"
  when: not ntp_running
